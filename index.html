<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보실 랜덤 자리 배치</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        
        .seat {
            transition: all 0.2s ease-in-out;
        }
        .seat.disabled {
            background-color: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l20 20M20 0L0 20' stroke='%2394a3b8' stroke-width='1'/%3E%3C/svg%3E");
        }
        .seat.active {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            cursor: pointer;
        }
        .seat.active:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .seat.assigned {
            background-color: #ffffff;
            border-color: #22c55e;
            border-width: 2px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            animation: bounce 0.5s cubic-bezier(0.36, 0, 0.66, -0.56) 1;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .rolling-text {
            animation: roll-blur 0.1s infinite;
        }
        @keyframes roll-blur {
            0% { filter: blur(0px); transform: scale(1); }
            50% { filter: blur(2px); transform: scale(1.1); }
            100% { filter: blur(0px); transform: scale(1); }
        }

        .podium {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">🖥️ 정보실 자리 배치 시스템</h1>
            <p class="text-slate-500 font-medium">강력한 랜덤 셔플 알고리즘이 적용된 배치 프로그램입니다.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 설정 영역 -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                        👥 학생 명단 입력
                    </h2>
                    <textarea id="nameInput" rows="8" 
                        class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:outline-none text-sm transition-all resize-none"
                        placeholder="이름을 쉼표(,)나 줄바꿈으로 구분하여 입력..."></textarea>
                    <div class="mt-3 flex justify-between items-center px-1">
                        <span class="text-sm text-slate-500">입력된 학생 수</span>
                        <span id="studentCount" class="text-xl font-bold text-blue-600">0명</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-4 text-slate-800">⚙️ 배치 컨트롤</h2>
                    <div class="space-y-3">
                        <button id="drawBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-200 active:scale-95 flex items-center justify-center gap-2">
                            <span>🚀 무작위 섞기 & 배치</span>
                        </button>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="resetBtn" class="py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-semibold transition-all">
                                전체 초기화
                            </button>
                            <button id="captureBtn" class="py-3 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-xl font-semibold transition-all flex items-center justify-center gap-1">
                                📸 이미지 저장
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 자리 배치도 영역 -->
            <div class="lg:col-span-8" id="captureArea">
                <div class="podium p-5 rounded-t-[2rem] flex justify-between items-center px-10">
                    <span class="text-emerald-400 font-bold text-lg">🚪 문</span>
                    <span class="text-slate-400 font-black tracking-[0.5em] text-sm uppercase italic">Podium / Screen</span>
                    <span class="text-blue-300 font-bold text-lg">👨‍🏫 선생님 자리</span>
                </div>
                <div class="bg-white p-8 rounded-b-[2rem] shadow-xl border border-slate-200">
                    <div id="gridContainer" class="grid grid-cols-6 gap-4">
                        <!-- 6x6 그리드가 JS로 생성됨 -->
                    </div>
                </div>
                
                <div class="mt-8 flex flex-wrap justify-center gap-6 text-sm font-medium text-slate-500 no-capture">
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 bg-white border-2 border-slate-200 rounded-md"></div> 
                        <span>배정 가능</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 bg-slate-300 rounded-md"></div> 
                        <span>제외 좌석(X)</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-5 h-5 bg-emerald-100 border-2 border-emerald-500 rounded-md"></div> 
                        <span>배정 완료</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="statusToast" class="fixed top-10 left-1/2 -translate-x-1/2 px-8 py-4 bg-slate-900 text-white rounded-2xl shadow-2xl opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <span id="toastIcon">📢</span>
        <span id="toastMsg">메시지</span>
    </div>

    <script>
        const gridContainer = document.getElementById('gridContainer');
        const nameInput = document.getElementById('nameInput');
        const studentCountEl = document.getElementById('studentCount');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const captureBtn = document.getElementById('captureBtn');
        const statusToast = document.getElementById('statusToast');

        let seats = [];
        const ROWS = 6;
        const COLS = 6;
        let isDrawing = false;

        // 사운드 시스템
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSfx(freq, duration, type = 'sine', volume = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 강력한 셔플 알고리즘 (Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function getCustomSeatNumber(r, c) {
            const map = [
                ["1", "3", "X", "X", "5", "7"],
                ["2", "4", "X", "X", "6", "8"],
                ["9", "11", "X", "X", "13", "15"],
                ["10", "12", "X", "X", "14", "16"],
                ["17", "19", "21", "23", "25", "27"],
                ["18", "20", "22", "24", "26", "28"]
            ];
            return map[r][c];
        }

        function initGrid() {
            gridContainer.innerHTML = '';
            seats = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const customNum = getCustomSeatNumber(r, c);
                    const isActive = customNum !== "X";
                    const i = r * COLS + c;
                    
                    const seatObj = { id: i, active: isActive, student: null, label: customNum };
                    seats.push(seatObj);

                    const seatEl = document.createElement('div');
                    seatEl.id = `seat-${i}`;
                    seatEl.className = `seat ${isActive ? 'active' : 'disabled'} h-20 md:h-24 flex flex-col items-center justify-center rounded-2xl border-2 text-xs font-bold shadow-sm overflow-hidden text-center relative`;
                    
                    const labelDisplay = isActive ? `#${customNum}` : '';
                    const nameContent = isActive ? '' : 'X';

                    seatEl.innerHTML = `
                        <span class="absolute top-2 left-2 text-[10px] ${isActive ? 'text-slate-300' : 'text-slate-500'}">${labelDisplay}</span>
                        <span class="name text-slate-800 text-base font-extrabold px-1"></span>
                    `;
                    
                    if (isActive) {
                        seatEl.addEventListener('click', () => toggleSeat(i));
                    } else {
                        seatEl.querySelector('.name').innerText = 'X';
                    }
                    gridContainer.appendChild(seatEl);
                }
            }
        }

        function toggleSeat(index) {
            if (isDrawing) return;
            seats[index].active = !seats[index].active;
            const el = document.getElementById(`seat-${index}`);
            if (seats[index].active) {
                el.classList.remove('disabled');
                el.classList.add('active');
                el.querySelector('.name').innerText = '';
                el.querySelector('span:first-child').innerText = `#${seats[index].label}`;
            } else {
                el.classList.add('disabled');
                el.classList.remove('active');
                el.querySelector('.name').innerText = 'X';
                el.querySelector('span:first-child').innerText = '';
                playSfx(150, 0.1, 'triangle');
            }
        }

        nameInput.addEventListener('input', () => {
            const names = getNames();
            studentCountEl.innerText = `${names.length}명`;
        });

        function getNames() {
            return nameInput.value.split(/[\n,]+/).map(n => n.trim()).filter(n => n !== '');
        }

        function showToast(msg, icon = '📢') {
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = icon;
            statusToast.style.opacity = '1';
            statusToast.style.transform = 'translate(-50%, 20px)';
            setTimeout(() => {
                statusToast.style.opacity = '0';
                statusToast.style.transform = 'translate(-50%, 0)';
            }, 3000);
        }

        async function startDrawing() {
            const names = getNames();
            const activeSeats = seats.filter(s => s.active);

            if (names.length === 0) return showToast('학생 이름을 먼저 입력해주세요!', '⚠️');
            if (names.length > activeSeats.length) return showToast(`좌석이 부족합니다! (현재 학생 ${names.length}명 / 가능 좌석 ${activeSeats.length}개)`, '❌');

            isDrawing = true;
            drawBtn.disabled = true;
            nameInput.disabled = true;
            drawBtn.classList.replace('bg-blue-600', 'bg-slate-400');
            drawBtn.innerText = "🎲 명단 섞는 중...";

            // 1. 명단 셔플 (여러 번 반복하여 무작위성 강화)
            let shuffledNames = [...names];
            for(let i=0; i<5; i++) {
                shuffledNames = shuffle(shuffledNames);
            }

            // 2. 좌석 셔플
            let targetSeats = shuffle([...activeSeats]).slice(0, names.length);

            // 기존 배치 효과 초기화
            activeSeats.forEach(s => {
                const el = document.getElementById(`seat-${s.id}`);
                el.classList.remove('assigned');
                el.querySelector('.name').innerText = '';
            });

            // 3. 순차적 배치 애니메이션
            for (let i = 0; i < targetSeats.length; i++) {
                const seatObj = targetSeats[i];
                const seatEl = document.getElementById(`seat-${seatObj.id}`);
                const nameSpan = seatEl.querySelector('.name');

                seatEl.classList.add('ring-4', 'ring-blue-400', 'z-10', 'scale-110');
                
                // 롤링 효과
                for (let j = 0; j < 8; j++) {
                    nameSpan.innerText = names[Math.floor(Math.random() * names.length)];
                    nameSpan.classList.add('rolling-text');
                    playSfx(300 + (j * 40), 0.05, 'sine', 0.03);
                    await new Promise(r => setTimeout(r, 50));
                }

                nameSpan.classList.remove('rolling-text');
                nameSpan.innerText = shuffledNames[i];
                seatEl.classList.remove('ring-4', 'ring-blue-400', 'scale-110');
                seatEl.classList.add('assigned');
                playSfx(600, 0.3, 'square', 0.08);
                
                await new Promise(r => setTimeout(r, 150));
            }

            drawBtn.innerText = "✅ 배치 완료!";
            showToast('공정하게 자리가 배정되었습니다!', '🎉');
            isDrawing = false;
        }

        captureBtn.addEventListener('click', () => {
            const area = document.getElementById('captureArea');
            showToast('이미지 생성 중...', '📸');
            
            html2canvas(area, {
                backgroundColor: '#f1f5f9',
                scale: 2,
                ignoreElements: (el) => el.classList.contains('no-capture')
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `정보실_자리배치_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                showToast('이미지가 저장되었습니다!', '💾');
            });
        });

        resetBtn.addEventListener('click', () => {
            if (isDrawing) return;
            if (confirm('모든 설정을 초기화하고 다시 시작할까요?')) {
                initGrid();
                drawBtn.disabled = false;
                nameInput.disabled = false;
                drawBtn.classList.replace('bg-slate-400', 'bg-blue-600');
                drawBtn.innerText = "🚀 무작위 섞기 & 배치";
                studentCountEl.innerText = `${getNames().length}명`;
            }
        });

        drawBtn.addEventListener('click', startDrawing);

        initGrid();
    </script>
</body>
</html>
