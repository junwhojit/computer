<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보실 좌석 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        
        .seat { transition: all 0.2s ease; }
        .seat.disabled {
            background-color: #cbd5e1;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l20 20M20 0L0 20' stroke='%2394a3b8' stroke-width='1'/%3E%3C/svg%3E");
        }
        .seat-input {
            background: transparent;
            border: none;
            text-align: center;
            width: 100%;
            font-weight: 800;
            font-size: 1.1rem;
            outline: none;
        }
        .podium {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900">🖥️ 정보실 좌석 관리자</h1>
                <p class="text-slate-500">자리를 클릭해 상태를 바꾸거나 이름을 직접 입력하세요.</p>
            </div>
            <div class="flex gap-2">
                <button id="captureBtn" class="px-4 py-2 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 shadow-lg transition-all">📸 이미지 저장</button>
                <button id="resetBtn" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-all">🔄 초기화</button>
            </div>
        </header>

        <div id="captureArea">
            <div class="podium p-4 rounded-t-[2rem] flex justify-between items-center px-10">
                <span class="text-emerald-400 font-bold">🚪 문</span>
                <span class="text-slate-400 font-black tracking-widest text-sm italic">SCREEN</span>
                <span class="text-blue-300 font-bold">👨‍🏫 선생님 자리</span>
            </div>
            
            <div class="bg-white p-6 rounded-b-[2rem] shadow-2xl border border-slate-200">
                <div id="gridContainer" class="grid grid-cols-6 gap-3">
                    </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-slate-400 text-sm">
            <p>팁: 자리를 클릭하면 [빈자리] ↔ [사용 안 함(X)] 상태가 전환됩니다.</p>
        </footer>
    </div>

    <script>
        const gridContainer = document.getElementById('gridContainer');
        const ROWS = 6, COLS = 6;
        
        // 좌석 번호 맵핑 (기존과 동일)
        const seatMap = [
            ["1", "3", "X", "X", "5", "7"],
            ["2", "4", "X", "X", "6", "8"],
            ["9", "11", "X", "X", "13", "15"],
            ["10", "12", "X", "X", "14", "16"],
            ["17", "19", "21", "23", "25", "27"],
            ["18", "20", "22", "24", "26", "28"]
        ];

        function createGrid() {
            gridContainer.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const label = seatMap[r][c];
                    const isX = label === "X";
                    
                    const seatEl = document.createElement('div');
                    seatEl.className = `seat ${isX ? 'disabled' : 'bg-white border-2 border-slate-200'} h-24 rounded-2xl flex flex-col items-center justify-center relative p-2 shadow-sm transition-all`;
                    
                    // 번호 표시 (X여도 번호는 작게 보여줌)
                    const numLabel = document.createElement('span');
                    numLabel.className = "absolute top-2 left-2 text-[10px] font-bold text-slate-300";
                    numLabel.innerText = isX ? "" : `#${label}`;
                    
                    // 이름 입력칸
                    const input = document.createElement('input');
                    input.type = "text";
                    input.className = "seat-input";
                    input.value = isX ? "X" : "";
                    input.disabled = isX;
                    input.placeholder = isX ? "" : "입력";

                    // 클릭 시 상태 전환 (입력창이 아닌 테두리 클릭 시)
                    seatEl.addEventListener('mousedown', (e) => {
                        if(e.target === input) return; // 입력창 클릭 시는 제외
                        
                        if (seatEl.classList.contains('disabled')) {
                            // X -> 빈자리로 변경
                            seatEl.classList.remove('disabled');
                            seatEl.classList.add('bg-white', 'border-2', 'border-slate-200');
                            input.value = "";
                            input.disabled = false;
                            input.placeholder = "입력";
                            numLabel.innerText = "사용"; // 새로 연 자리는 '사용'으로 표시
                        } else {
                            // 빈자리 -> X로 변경
                            seatEl.classList.add('disabled');
                            seatEl.classList.remove('bg-white', 'border-2', 'border-slate-200');
                            input.value = "X";
                            input.disabled = true;
                            input.placeholder = "";
                            numLabel.innerText = "";
                        }
                    });

                    seatEl.appendChild(numLabel);
                    seatEl.appendChild(input);
                    gridContainer.appendChild(seatEl);
                }
            }
        }

        // 이미지 저장
        document.getElementById('captureBtn').addEventListener('click', () => {
            html2canvas(document.getElementById('captureArea'), {
                backgroundColor: '#f1f5f9',
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '정보실_좌석배치도.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        });

        // 초기화
        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm('모든 내용을 지우고 처음으로 돌아갈까요?')) createGrid();
        });

        createGrid();
    </script>
</body>
</html>
